<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作業規程の準則 路線測量</title>
   
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    

<style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            /* 全体の固定を解除し、中身だけスクロールさせる準備 */
        }
        
        .header { 
            background: #1a3e5e; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            flex-shrink: 0; /* ヘッダーの高さを固定 */
        }

        #container { 
            flex: 1; 
            display: flex; 
            align-items: flex-start; /* 中央寄せから上寄せに変更 */
            justify-content: center; 
            padding: 15px; 
            overflow-y: auto; /* ★ここが重要：縦スクロールを許可 */
            -webkit-overflow-scrolling: touch; /* iPhoneでのスクロールを滑らかにする */
        }

        .clause-card { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            /* min-heightを解除し、中身に合わせて伸びるように変更 */
            margin-bottom: 20px; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            display: none; 
            flex-direction: column; 
            box-sizing: border-box;
        }
        
	.back-btn {
    color: #ffcc00; /* ★ここで色を変える（#ffcc00 は鮮やかな黄色） */
    text-decoration: none;
    position: absolute;
    left: 15px;
    font-size: 1.5rem;    /* サイズの調整 */
    font-weight: bold;    /* 太くして見やすくする */
}

        .clause-card.active { display: flex; }

        .clause-title { font-weight: bold; color: #3498db; border-left: 5px solid #3498db; padding-left: 10px; margin-bottom: 20px; flex-shrink: 0; }
        .text { line-height: 2.3; font-size: 1.05rem; color: #333; word-wrap: break-word; }

        .blank { display: inline-block; background: #cbd5e0; color: #cbd5e0; padding: 0 8px; border-radius: 4px; cursor: pointer; font-weight: bold; border-bottom: 2px solid #a0aec0; }
        .blank.show { background: #fff3cd !important; color: #e74c3c !important; border-bottom: 2px solid #f6e05e !important; }

        .num-label { display: inline-block; width: 22px; height: 22px; line-height: 22px; background: #3498db; color: white; border-radius: 50%; text-align: center; font-size: 11px; margin-right: 5px; flex-shrink: 0; }

        .nav-bar { 
            background: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid #ddd; 
            flex-shrink: 0; /* ナビバーの高さを固定 */
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }
        
        .nav-btn { background: #1a3e5e; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-size: 1rem; font-weight: bold; width: 40%; cursor: pointer; }
        .nav-btn:disabled { background: #ccc; cursor: default; }
        .page-info { font-weight: bold; color: #666; }
    </style>
</head>
<body>


	<div class="header"><a href="index.html" class="back-btn">＜</a><span>作業規程の準則 路線測量</span>
	</div>

<div id="container">
<div class="clause-card active">
        <div class="clause-title">準備中</div>
        <div class="text">
       <span class="num-label">1</span><span class="blank g1" onclick="toggleLocal(this, 'g1')">準備中</span>
        </div>
    </div>

<div class="clause-card">
        <div class="clause-title">準備中</div>
        <div class="text">
	<span class="num-label">1</span><span class="blank g1" onclick="toggleLocal(this, 'g1')">準備中</span>
	</div>
    </div>


<div class="clause-card">
        <div class="clause-title">準備中</div>
        <div class="text">
	準備中
	<br>準備中
	<br>・<span class="blank" onclick="this.classList.toggle('show')">準備中</span>
       </div>
    </div>


</div>

<div class="nav-bar">
    <button type="button" class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>前へ</button>
    <div class="page-info"><span id="current-page">1</span> / <span id="total-pages">4</span></div>
    <button type="button" class="nav-btn" id="nextBtn" onclick="changePage(1)">次へ</button>
</div>

<script>
    var currentPage = 0;
    var cards = document.getElementsByClassName('clause-card');
    
    function updateUI() {
        var total = cards.length;
        document.getElementById('total-pages').innerText = total;
        document.getElementById('current-page').innerText = currentPage + 1;
        document.getElementById('prevBtn').disabled = (currentPage === 0);
        document.getElementById('nextBtn').disabled = (currentPage === total - 1);
    }

    function changePage(step) {
        // すべての穴埋めをリセット
        var allBlanks = document.getElementsByClassName('blank');
        for (var j = 0; j < allBlanks.length; j++) {
            allBlanks[j].classList.remove('show');
        }

        // 現在のカードを非表示にする
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('active');
            cards[i].style.display = 'none';
        }
        
        // ページ移動
        currentPage += step;
        if (currentPage < 0) currentPage = 0;
        if (currentPage >= cards.length) currentPage = cards.length - 1;
        
        // 新しいカードを表示する
        cards[currentPage].classList.add('active');
        cards[currentPage].style.display = 'flex';
        
        updateUI();
    }

    function toggleLocal(el, groupClass) {
        var parentCard = el.closest('.clause-card');
        var targets = parentCard.getElementsByClassName(groupClass);
        var isShow = el.classList.contains('show');
        for (var i = 0; i < targets.length; i++) {
            if (isShow) targets[i].classList.remove('show');
            else targets[i].classList.add('show');
        }
    }

    updateUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
